#DB
spring.application.name=imposter-backend
spring.datasource.url=jdbc:h2:mem:db;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=sa
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG


#Versioning
spring.mvc.apiversion.requires = true
spring.mvc.apiversion.use.path-segment = 1
spring.mvc.apiversion.default-version = 1

#JWT
app.jwt.secret=nekajzelodolgegainvarnegatukajzanamenetestiranja12345
app.jwt.expiration-ms=86400000

#logging
logging.file.name=imposter.log
logging.file.path=logs
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=100MB

logging.level.com.example.imposter_backend=ERROR